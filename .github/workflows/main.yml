name: Build PoomaniTV APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Build APK and Catch Errors
      run: |
        if [ -d "PoomaniTV" ]; then cd PoomaniTV; fi
        gradle assembleDebug --stacktrace > error_log.txt 2>&1 || true

    - name: Upload Error Log
      uses: actions/upload-artifact@v4
      with:
        name: Crash-Report-Log
        path: "**/error_log.txt"
